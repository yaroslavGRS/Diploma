<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Search</title>
    <style>
        /*
         * VERSION 2 — Search form, renamed IDs.
         * Selenium tests use old IDs (search-query, search-category, search-btn) — all missing.
         * Visual appearance identical to v1 — YOLOv8 recovers input, dropdown, and button.
         */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .card { background: #fff; padding: 40px 36px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); width: 420px; }
        .card h1 { font-size: 22px; margin-bottom: 28px; color: #1a1a2e; text-align: center; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; margin-bottom: 18px; }
        .form-input:focus { outline: none; border-color: #4a90e2; }
        select.form-input { background: #fff; cursor: pointer; }
        .btn-primary { width: 100%; padding: 11px; background: #27ae60; color: #fff; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; }
        .btn-primary:hover { background: #219a52; }
        .version-badge { text-align: center; margin-top: 20px; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Product Search</h1>

        <!--
            v1 → v2 mutations (renamed IDs):
              id="search-query"    → id="qry-input"
              id="search-category" → id="cat-select"
              id="search-btn"      → id="find-btn"
        -->
        <form method="POST" action="">
            <label for="qry-input">Search query</label>
            <input type="text" id="qry-input" name="search-query" class="form-input" placeholder="Enter product name..." autocomplete="off" />

            <label for="cat-select">Category</label>
            <select id="cat-select" name="search-category" class="form-input">
                <option value="">— Select category —</option>
                <option value="electronics">Electronics</option>
                <option value="clothing">Clothing</option>
                <option value="books">Books</option>
                <option value="sports">Sports</option>
            </select>

            <button type="submit" id="find-btn" class="btn-primary">Search</button>
        </form>

        <p class="version-badge">v2 — renamed IDs</p>
    </div>
</body>
</html>
