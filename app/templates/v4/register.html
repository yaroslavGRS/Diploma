<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register</title>
    <style>
        /*
         * VERSION 4 — Registration form, wrapper divs around every field.
         * Simulates React/Vue components where inputs are wrapped in containers.
         * Selenium tests use old IDs — all missing. YOLOv8 locates by visual position.
         */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .reg-card { background: #fff; padding: 40px 36px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); width: 380px; }
        .reg-card h1 { font-size: 22px; margin-bottom: 28px; color: #1a1a2e; text-align: center; }
        label { display: block; font-size: 13px; color: #555; margin-bottom: 5px; }
        .field-wrap { margin-bottom: 18px; }
        .form-input { width: 100%; padding: 10px 12px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; }
        .form-input:focus { outline: none; border-color: #4a90e2; }
        .btn-primary { width: 100%; padding: 11px; background: #4a90e2; color: #fff; border: none; border-radius: 5px; font-size: 15px; cursor: pointer; }
        .btn-primary:hover { background: #357abd; }
        .error-msg { color: #c0392b; font-size: 13px; margin-bottom: 14px; text-align: center; }
        .version-badge { text-align: center; margin-top: 20px; font-size: 11px; color: #bbb; }
    </style>
</head>
<body>
    <div class="reg-card">
        <h1>Create Account</h1>

        {% if error %}
        <p class="error-msg">{{ error }}</p>
        {% endif %}

        <!--
            v1 → v4 mutations:
              id="reg-name"     → id="wrap-name"     (inside .field-wrap)
              id="reg-email"    → id="wrap-reg-email" (inside .field-wrap)
              id="reg-password" → id="wrap-reg-pwd"   (inside .field-wrap)
              id="reg-btn"      → id="wrap-reg-btn"   (inside .field-wrap)
        -->
        <form method="POST" action="">
            <label for="wrap-name">Full Name</label>
            <div class="field-wrap">
                <input type="text" id="wrap-name" name="reg-name" class="form-input" placeholder="Enter your name" autocomplete="off" />
            </div>

            <label for="wrap-reg-email">Email</label>
            <div class="field-wrap">
                <input type="email" id="wrap-reg-email" name="reg-email" class="form-input" placeholder="Enter your email" autocomplete="off" />
            </div>

            <label for="wrap-reg-pwd">Password</label>
            <div class="field-wrap">
                <input type="password" id="wrap-reg-pwd" name="reg-password" class="form-input" placeholder="Create a password" />
            </div>

            <div class="field-wrap">
                <button type="submit" id="wrap-reg-btn" class="btn-primary">Register</button>
            </div>
        </form>

        <p class="version-badge">v4 — wrapper div mutation</p>
    </div>
</body>
</html>
